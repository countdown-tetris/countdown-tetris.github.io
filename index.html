<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>告白までの残り時間</title>
    <style>
        body {
            font-family: "BIZ UD Gothic", "UD Digi Kyokasho NK-R", "Meiryo UI", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f7fa;
            color: #333333;
        }
        .container {
            text-align: center;
            padding: 20px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .title {
            font-size: 1.1rem;
            color: #666666;
            margin-bottom: 10px;
        }
        .timer {
            font-variant-numeric: tabular-nums;
            font-size: 2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <div id="timer-title" class="title">計算中...</div>
    <div id="difference-timer" class="timer"></div>
</div>
<script>
    const targetDate = new Date(2026, 5, 29, 16, 10, 0);
    function updateTimer() {
        const now = new Date();
        const diffMs = Math.abs(now - targetDate); 
        const titleElement = document.getElementById('timer-title');
        if (now < targetDate) {
            titleElement.textContent = "告白までの残り時間";
        } else {
            titleElement.textContent = "告白からの経過時間";
        }
        const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
        const diffHours = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const diffMinutes = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
        const diffSeconds = Math.floor((diffMs % (1000 * 60)) / 1000);
        document.getElementById('difference-timer').textContent = 
            `${diffDays}日 ${diffHours}時間 ${diffMinutes}分 ${diffSeconds}秒`;
    }
    setInterval(updateTimer, 1000);
    updateTimer();
</script>
</body>
</html>
