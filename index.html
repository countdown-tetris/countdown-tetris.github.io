<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>経過時間の表示</title>
    <style>
        body {
            /* UDフォントを優先的に指定し、無駄な余白を排除 */
            font-family: "BIZ UD Gothic", "UD Digi Kyokasho NK-R", "Meiryo UI", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f7fa;
            color: #333333;
        }
        .container {
            text-align: center;
            padding: 20px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .title {
            font-size: 1.1rem;
            color: #666666;
            margin-bottom: 10px;
        }
        .timer {
            /* 数字の幅を一定にしてガタつきを防止 */
            font-variant-numeric: tabular-nums;
            font-size: 2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">2026年6月29日 16:10 からの経過時間</div>
    <div id="difference-timer" class="timer">計算中...</div>
</div>

<script>
    // ターゲット日時を設定 (2026年6月29日 16:10:00)
    // ※JavaScriptの月は0から始まるため、6月は「5」を指定します
    const targetDate = new Date(2026, 5, 29, 16, 10, 0);

    function updateTimer() {
        const now = new Date();
        const diffMs = now - targetDate; // ミリ秒単位の差分

        // ターゲット日時より前の場合はマイナス表示などを防ぐ
        if (diffMs < 0) {
            document.getElementById('difference-timer').textContent = "まだ指定の時間に達していません";
            return;
        }

        // 各単位に変換
        const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
        const diffHours = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const diffMinutes = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
        const diffSeconds = Math.floor((diffMs % (1000 * 60)) / 1000);

        // 画面に表示
        document.getElementById('difference-timer').textContent = 
            `${diffDays}日 ${diffHours}時間 ${diffMinutes}分 ${diffSeconds}秒`;
    }

    // 1秒ごとに更新
    setInterval(updateTimer, 1000);
    
    // 初回読み込み時にも即座に実行
    updateTimer();
</script>

</body>
</html>
